<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .wrapper{
            display: flex;
            justify-content: space-evenly;
            height: 100vh;
            align-items: center;
            flex-wrap: wrap;
        }
        .item{
            width: 200px;
            height: 200px;
            background: #22C1C3;
            background: linear-gradient(0deg,rgba(34, 193, 195, 1) 0%, rgba(253, 187, 45, 1) 100%);
            box-shadow: -1px 16px 15px 5px rgba(0,0,0,0.81);
            border-radius: 50%;
            border: 3px solid #22C1C3;
            transition: 1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item a{
            text-decoration: none;
            color: silver;
        }
        .item:hover{
            border-radius: 0;
            border: 6px solid orange;
            transition: 3s ;
            transform: scale(1.1);
        }
        .item:hover a{
            color: deeppink;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item">
        <a href="#">link</a>
    </div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</body>
</html>
