<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">

          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 100px;
        }
        .card{
            width: 200px;
            height: 250px;
            background: #918d8d;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .sale{
            width: 70px;
            height: 45px;
            background: #918d8d;
            position: absolute;
            top: -20px;
            border-radius: 20px 20px 0 0 ;
        }
        .sale-bottom{
            width: 70px;
            height: 45px;
            background: #918d8d;
            position: absolute;
            bottom: -20px;
            border-radius: 0 0 20px 20px ;
        }
    </style>
</head>

    <div class="sale"></div>
    <p>Lorem ipsum.</p>

</div>
