<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        .container{
            display: grid;
            height: 100vh;
            background: #918d8d;
            /*grid-template-columns: 100px 50% 10vw;*/
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr 3fr 1fr;
            grid-row-gap: 20px;
            /*gap: 50px;*/
        }
        .item{
            background: #33ec79;
            border: 1px solid;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .container div:nth-child(5){
            background: #5454D4;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="item">
        <p>Lorem ipsum dolor sit amet.</p>
    </div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</body>
</html>
