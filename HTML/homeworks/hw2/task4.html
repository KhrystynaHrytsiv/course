<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Fjalla+One&family=Indie+Flower&family=Rubik+Pixels&family=Sedgwick+Ave+Display&display=swap" rel="stylesheet">
    <style>
        body{
            margin: 0;
        }
        .wrapper{
            display: flex;
            justify-content: space-around;
        }
        .block{
            width: 200px;
            height: 200px;
            background-color: rgba(68, 222, 224, 0.67);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .rubik-pixels-regular {
            font-family: "Rubik Pixels", system-ui;
        }
        .sedgwick-ave-display-regular {
            font-family: "Sedgwick Ave Display", cursive;

        }
        .dancing-script {
            font-family: "Dancing Script", cursive;
        }
        .fjalla-one-regular {
            font-family: "Fjalla One", sans-serif;
        }
        .indie-flower-regular {
            font-family: "Indie Flower", cursive;
        }

    </style>
</head>
<body>
<div class="wrapper">
    <div class="block rubik-pixels-regular">Rubik Pixels</div>
    <div class="block sedgwick-ave-display-regular">Sedgwick Ave Display</div>
    <div class="block dancing-script">Dancing Script</div>
    <div class="block fjalla-one-regular">Fjalla One</div>
    <div class="block indie-flower-regular">Indie Flower</div>
</div>
</body>
</html>
