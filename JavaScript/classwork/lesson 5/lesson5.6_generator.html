    function* cardsHolder(){
        const cards =[
            {value:6 , suite: 'diamond'},
            {value:7 , suite: 'spade'},
            {value: 8, suite: 'diamond'},
            {value: 9, suite: 'spade'}
        ];
        for (let card of cards){
            yield card;
        }
    }
    const cardHolderGenerator = cardsHolder();

    console.log(cardHolderGenerator.next().value);
