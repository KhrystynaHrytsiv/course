<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<script>
    fetch('https://jsonplaceholder.typicode.com/users')
        .then((response) => {
            console.log(response);
            return response.json()
        })
        .then(users => {
            for (const {name, username, email} of users) {
                document.write(`<div>
                ${name} ${username}
                </div>`)
            }
        });


    fetch('https://dummyjson.com/products?limit=100&skip=10')
        .then(response => response.json()) // Convert response to blob
        .then(res => {
            console.log(res);
            let {products} = res;
            document.write(`<div>`)
            for (const product of products) {
            document.write(`<div>`)
                document.write(`<p>${product.id} ${product.brand} - ${product.price}</p>`);
            document.write(`<img src="${product.thumbnail}"/>`)
            document.write(`</div>`)

            }
            document.write(`</div>`)
        });



    fetch('https://dummyjson.com/products/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title: 'BMW Pencil'
        })
    })
        .then(res => res.json())
        .then(console.log);
</script>
</body>
</html>
